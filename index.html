    <style>
        body{

}
header{

}
nav{
    margin-left: 992px;

}
nav a{

}
.s1{
  width: 100%;

  background-color: beige;
  position: relative;
}
.s1 img{
  width: 100%;

}
.box button{
  position: absolute;
    left: 701px;
    right: 56px;
    top: 300px;
    width: 162px;
    height: 53px;
}
 @media (max-width: 1200px) {
            nav {

            }

        /* Large tablets (max-width: 992px) */

            header {
                height: auto;

                align-items: center;
                padding: 20px 0;
                position: static;
            }
            nav {
                margin-left: 0;
                margin-top: 10px;
                text-align: center;
            }
            .box button {
                top: 40%;
                width: 200px;
                height: 55px;
                font-size: 1rem;
            }
            .s1, .s1 img {
                height: auto;
                min-height: 100vh;
            }
        }

        /* Tablets & large phones (max-width: 768px) */
        @media (max-width: 768px) {
            .box button {
                top: 45%;
                width: 180px;
                height: 50px;
                font-size: 0.9rem;
            }
            nav a {
                margin: 8px;
                font-size: 0.9rem;
            }
            h1.h1 {
                font-size: 1.8rem;
                text-align: center;
            }
        }

        /* Mobile phones (max-width: 576px) */
        @media (max-width: 576px) {
            header {
                padding: 10px 0;
            }
            h1.h1 {
                font-size: 1.4rem;
            }
            nav {
                margin-top: 5px;
            }
            .box button {
                top: 50%;
                width: 160px;
                height: 45px;
                font-size: 0.85rem;
                left: 50%;
                transform: translateX(-50%);
            }
            .s1, .s1 img {
                height: auto;
                min-height: 80vh;
            }
            /* Ensure footer text is readable */
            footer div[style*="flex: 1"] {
                min-width: 100% !important;
            }
            footer div[style*="display: flex"] {
                flex-direction: column;
                gap: 0.8rem !important;
            }
        }

        /* Very small devices (max-width: 400px) */
        @media (max-width: 400px) {
            .box button {
                width: 140px;
                height: 40px;
                font-size: 0.75rem;
                top: 55%;
            }
            h1.h1 {
                font-size: 1.2rem;
            }
        }
    </style>

    <script>
    (function() {
        // Wait for the DOM to be fully loaded to ensure button exists
        document.addEventListener('DOMContentLoaded', function() {
            // Select the button inside .box (the main courses button)
            const courseButton = document.querySelector('.box button');
            
            // If button exists, attach click event to open the course file
            if (courseButton) {
                courseButton.addEventListener('click', function(event) {
                    // Prevent any accidental default behavior (none needed, but safe)
                    event.preventDefault();
                    // Open courses.html in the same tab/window.
                    // This corresponds to the "course file" that contains all course materials.
                    // According to requirement: "course file will open"
                    window.location.href = 'courses.html';
                });
            } else {
                // fallback: in case of dynamic content, but our structure guarantees the button
                console.warn("Button not found — but structure is correct");
            }

            // Extra safety: Also handle if any other element links to courses in future,
            // but we explicitly target the required button.
            // Additionally, the button has a distinct ID for maximum robustness
            const secondaryBtn = document.getElementById('openCoursesBtn');
            if (secondaryBtn && secondaryBtn !== courseButton) {
                secondaryBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.location.href = 'courses.html';
                });
            }
        });
    })();
</script>
